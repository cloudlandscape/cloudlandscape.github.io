# The URL the site will be built for
base_url = "https://cloudlandscape.github.io"

# Default language
default_language = "fr"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = false

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

# Minify HTML output
minify_html = true

# Language configuration
[languages.en]
title = "Cloud Landscape"
description = "Comprehensive directory of European sovereign cloud providers"
taxonomies = [
    { name = "services", render = true },
    { name = "certifications", render = true },
    { name = "countries", render = true },
]

[languages.en.translations]
search_label = "Search providers"
search_placeholder = "Search by name or description..."
show_filters = "Show Filters"
hide_filters = "Hide Filters"
filters_heading = "Filters"
services_legend = "Services"
certifications_legend = "Certifications"
countries_legend = "Countries"
reset_filters = "Reset All Filters"
providers_available = "providers available"
providers_match = "of {total} providers match your criteria"
result_template_all = "{count} providers available"
result_template_filtered = "{count} of {total} providers match your filters"
country_label = "Country"
services_label = "Services"
certifications_label = "Certifications"
add_to_comparison = "Add to Comparison"
added_to_comparison = "✓ Added to Comparison"
comparison_full = "Comparison Full"
noscript_message = "All providers are visible below. Filtering and search features require JavaScript to be enabled."

[languages.fr]
title = "Cloud Landscape"
