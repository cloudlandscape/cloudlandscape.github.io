{% extends "base.html" %}

{% block title %}{{ config.title }} - {{ section.title }}{% endblock %}

{% block content %}
<div class="home-content">
    <h1>{{ config.title }}</h1>
    <p class="tagline">{{ config.description }}</p>

    {% if section.content %}
    <div class="content">
        {{ section.content | safe }}
    </div>
    {% endif %}
</div>
{% endblock %}
